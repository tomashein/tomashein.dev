name: Build and Deploy Astro Static Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '24'
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Tests Pre-Build
        run: yarn test:run

      - name: Build Static Site
        run: yarn build
        env:
          PUBLIC_MAIL_URL: ${{ vars.PUBLIC_MAIL_URL }}
          PUBLIC_MAIL_KEY: ${{ vars.PUBLIC_MAIL_KEY }}

      - name: Deploy to CloudPanel VPS via rsync
        uses: AEnterprise/rsync-deploy@v1.0.2
        env:
          DEPLOY_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: '-avz --delete'
          SERVER_IP: ${{ secrets.VPS_IP }}
          USERNAME: ${{ secrets.VPS_USER }}
          SERVER_DESTINATION: ${{ secrets.VPS_PATH }}
